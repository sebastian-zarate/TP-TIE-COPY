<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fútbol + Música</title>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000bb;
      --bg2: #141414;
      --bg3: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0ede6;
      --text-muted: rgba(240,237,230,0.45);
      --text-dim: rgba(240,237,230,0.25);
      --accent: #c9f53b;
      --accent-dim: rgba(201,245,59,0.12);
      --win: #c9f53b;
      --draw: #f5c53b;
      --loss: #f53b5f;
      --win-dim: rgba(201,245,59,0.1);
      --draw-dim: rgba(245,197,59,0.1);
      --loss-dim: rgba(245,59,95,0.1);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 10% -10%, rgba(201,245,59,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 110%, rgba(245,59,95,0.04) 0%, transparent 60%);
    }

    /* ── LAYOUT ── */
    .page { max-width: 720px; margin: 0 auto; padding: 4rem 1.5rem 6rem; }

    .hero { margin-bottom: 3rem; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 1rem;
    }
    .hero-eyebrow::before {
      content: '';
      display: block; width: 20px; height: 1px; background: var(--accent);
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(36px, 6vw, 56px);
      line-height: 1.05;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .hero h1 em { font-style: italic; color: var(--text-muted); }
    .hero p {
      margin-top: 1rem;
      font-size: 15px; color: var(--text-muted);
      max-width: 480px; line-height: 1.7;
    }

    /* ── STEP INDICATOR ── */
    .steps {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 2rem;
    }
    .step {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .step.active { color: var(--text); }
    .step-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
    }
    .step.active .step-num {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .step.done .step-num {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 500;
    }
    .step-line { flex: 1; height: 1px; background: var(--border); max-width: 40px; }

    /* ── SEARCH ── */
    .search-label {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 8px;
    }
    .search-wrap { position: relative; margin-bottom: 1.25rem; }
    .search-wrap input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px 12px 40px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text-dim); }
    .search-wrap input:focus { border-color: var(--border-hover); }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: var(--text-dim); pointer-events: none;
    }

    /* ── TEAM GRID ── */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 6px;
      max-height: 340px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      padding-right: 4px;
    }
    .team-grid::-webkit-scrollbar { width: 4px; }
    .team-grid::-webkit-scrollbar-track { background: transparent; }
    .team-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .team-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      line-height: 1.3;
    }
    .team-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--bg3);
    }
    .team-btn.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 500;
    }

    /* ── SELECTED INFO BAR ── */
    .selected-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 1rem;
      font-size: 14px;
    }
    .selected-bar .label { color: var(--text-dim); font-size: 12px; }
    .selected-bar .name { color: var(--text); font-weight: 500; margin-top: 1px; }
    .clear-btn {
      background: transparent; border: none;
      color: var(--text-dim); cursor: pointer;
      font-size: 18px; line-height: 1; padding: 0 4px;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--text); }

    /* ── CTA BUTTON ── */
    .cta-btn {
      width: 100%;
      padding: 14px 20px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.1s;
    }
    .cta-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .cta-btn:active:not(:disabled) { transform: translateY(0); }
    .cta-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── RESULT AREA ── */
    #resultArea { margin-top: 2.5rem; }

    .result-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .match-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .match-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .match-date {
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-dim);
    }
    .result-pill {
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .pill-gano  { background: var(--win-dim);  color: var(--win);  }
    .pill-empato{ background: var(--draw-dim); color: var(--draw); }
    .pill-perdio{ background: var(--loss-dim); color: var(--loss); }

    .match-event {
      font-family: 'DM Serif Display', serif;
      font-size: 22px; line-height: 1.2;
      color: var(--text); margin-bottom: 8px;
    }
    .match-score {
      font-size: 32px; font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    /* ── PLAYLISTS ── */
    .playlists-section { padding: 1.25rem 1.5rem; }
    .playlists-heading {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 1rem;
    }

    .playlist-item {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.35s ease both;
    }
    .playlist-item:last-child { border-bottom: none; padding-bottom: 0; }
    .playlist-item:nth-child(1) { animation-delay: 0.05s; }
    .playlist-item:nth-child(2) { animation-delay: 0.1s; }
    .playlist-item:nth-child(3) { animation-delay: 0.15s; }
    .playlist-item:nth-child(4) { animation-delay: 0.2s; }

    .playlist-num {
      width: 22px; flex-shrink: 0;
      font-size: 12px; color: var(--text-dim);
      text-align: right;
    }
    .playlist-info { flex: 1; min-width: 0; }
    .playlist-name {
      font-size: 14px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .playlist-sub {
      font-size: 12px; color: var(--text-muted);
      margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .playlist-link {
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .playlist-link:hover { border-color: var(--border-hover); color: var(--text); }
    .spotify-icon { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── LOADING / STATUS ── */
    .status {
      padding: 2.5rem 1.5rem;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      color: var(--text-muted); font-size: 14px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-error { color: var(--loss); }
  </style>
</head>
<body>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-eyebrow">Argentina</div>
    <h1>Fútbol<br><em>+ música</em></h1>
    <p>Elegí tu equipo, consultamos el último resultado y te recomendamos la playlist perfecta para el momento.</p>
  </div>

  <!-- STEPS -->
  <div class="steps">
    <div class="step active" id="step1">
      <div class="step-num">1</div>
      <span>Elegí tu equipo</span>
    </div>
    <div class="step-line"></div>
    <div class="step" id="step2">
      <div class="step-num">2</div>
      <span>Último partido</span>
    </div>
    <div class="step-line"></div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      <span>Playlist</span>
    </div>
  </div>

  <!-- SELECTOR -->
  <div class="search-label">Buscar equipo</div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.2"/>
      <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Ej: River, Boca, Racing..." oninput="filtrarEquipos()" />
  </div>

  <div class="team-grid" id="teamGrid"></div>

  <div id="selectedBar" style="display:none" class="selected-bar">
    <div>
      <div class="label">Equipo seleccionado</div>
      <div class="name" id="selectedName">—</div>
    </div>
    <button class="clear-btn" onclick="limpiarSeleccion()" title="Cambiar equipo">×</button>
  </div>

  <button class="cta-btn" id="consultarBtn" disabled onclick="consultar()">
    Consultar último partido →
  </button>

  <!-- RESULT -->
  <div id="resultArea"></div>

</div>

<script>
let equipos = [];
let equipoSeleccionado = null;
let filtrados = [];

// 🔥 CARGAR EQUIPOS DESDE TU BACKEND
async function cargarEquipos() {
  try {
    const res = await fetch("http://localhost:3000/api/equipos");
    equipos = await res.json();
    filtrados = [...equipos];
    renderEquipos();
  } catch {
    document.getElementById('teamGrid').innerHTML =
      '<div class="status status-error">Error cargando equipos</div>';
  }
}

// ── RENDER GRID ──
function renderEquipos() {
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';

  filtrados.forEach(eq => {
    const btn = document.createElement('button');
    btn.className = 'team-btn' + (equipoSeleccionado?.id === eq.id ? ' selected' : '');
    btn.textContent = eq.nombre;
    btn.onclick = () => seleccionar(eq);
    grid.appendChild(btn);
  });
}

// ── SELECCIÓN ──
function seleccionar(eq) {
  equipoSeleccionado = eq;
  document.getElementById('selectedName').textContent = eq.nombre;
  document.getElementById('selectedBar').style.display = 'flex';
  document.getElementById('consultarBtn').disabled = false;
  document.getElementById('resultArea').innerHTML = '';
  setStep(1);
  renderEquipos();
}

function limpiarSeleccion() {
  equipoSeleccionado = null;
  document.getElementById('selectedBar').style.display = 'none';
  document.getElementById('consultarBtn').disabled = true;
  document.getElementById('resultArea').innerHTML = '';
  setStep(0);
  renderEquipos();
}

// ── FILTRO ──
function filtrarEquipos() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtrados = equipos.filter(e => e.nombre.toLowerCase().includes(q));
  renderEquipos();
}

// ── STEPS ──
function setStep(n) {
  ['step1','step2','step3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
    el.querySelector('.step-num').textContent = i < n ? '✓' : i + 1;
  });
}

// ── CONSULTA 
async function consultar() {
    console.log("Equipo seleccionado:", equipoSeleccionado);
  if (!equipoSeleccionado) return;

  const area = document.getElementById('resultArea');
  setStep(2);

  area.innerHTML = `
    <div class="result-card">
      <div class="status">
        <div class="spinner"></div> Buscando partido...
      </div>
    </div>`;

  try {
    // 🔥 LLAMA A TU API (NO A SPORTSDB DIRECTO)
    const res = await fetch(`http://localhost:3000/api/equipo/${equipoSeleccionado.id}`);
    const data = await res.json();

    const p = data.partido;
    const resultado = data.resultado;

    const gl = parseInt(p.intHomeScore);
    const gv = parseInt(p.intAwayScore);

    const pillClass =
      resultado === "GANO" ? "pill-gano" :
      resultado === "PERDIO" ? "pill-perdio" :
      "pill-empato";

    const pillLabel =
      resultado === "GANO" ? "Victoria" :
      resultado === "PERDIO" ? "Derrota" :
      "Empate";

    area.innerHTML = `
      <div class="result-card">
        <div class="match-header">
          <div class="match-meta">
            <span class="match-date">${p.dateEvent}</span>
            <span class="result-pill ${pillClass}">${pillLabel}</span>
          </div>
          <div class="match-event">${p.strEvent}</div>
          <div class="match-score">${gl} — ${gv}</div>
        </div>

        <div class="playlists-section">
          <div class="playlists-heading">Playlists recomendadas</div>
          <div id="playlistArea"></div>
        </div>
      </div>
    `;

    renderPlaylists(data.playlists);
    setStep(3);

  } catch (e) {
    area.innerHTML = `
      <div class="result-card">
        <div class="status status-error">Error al conectar con el servidor</div>
      </div>`;
  }
}

// ── PLAYLISTS DESDE TU BACKEND (Spotify 🔥)
function renderPlaylists(playlists) {
  const pArea = document.getElementById('playlistArea');
  const validPlaylists = (playlists || []).filter(Boolean);

  if (validPlaylists.length === 0) {
    pArea.innerHTML = '<div class="status">Sin playlists disponibles</div>';
    return;
  }

  pArea.innerHTML = validPlaylists.map((p, i) => {
    if (!p) return '';

    return `
      <div class="playlist-item">
        <span class="playlist-num">${i + 1}</span>

        <div class="playlist-info">
          <div class="playlist-name">${p.name}</div>
          <div class="playlist-sub">${p.owner?.display_name || "Spotify"}</div>
        </div>

        <a class="playlist-link" href="${p.external_urls.spotify}" target="_blank">
          Abrir
        </a>
      </div>
    `;
  }).join('');
}

// INIT
cargarEquipos();
</script>
</body>
</html>
