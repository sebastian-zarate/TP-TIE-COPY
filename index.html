<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fútbol + Música</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0c;
      --bg2:       #141414;
      --bg3:       #1c1c1c;
      --border:    rgba(255,255,255,0.07);
      --border-h:  rgba(255,255,255,0.15);
      --text:      #f0ede6;
      --muted:     rgba(240,237,230,0.45);
      --dim:       rgba(240,237,230,0.22);
      --accent:    #c9f53b;
      --accent-bg: rgba(201,245,59,0.1);
      --win:   #c9f53b; --win-bg:  rgba(201,245,59,0.08);
      --draw:  #f5c53b; --draw-bg: rgba(245,197,59,0.08);
      --loss:  #f5534a; --loss-bg: rgba(245,83,74,0.08);
      --r:  10px;
      --r2: 6px;
    }

    html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 70% 40% at 15% 0%, rgba(201,245,59,0.035) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 85% 100%, rgba(245,83,74,0.03) 0%, transparent 55%),
        var(--bg);
    }

    .page { max-width: 700px; margin: 0 auto; padding: 4rem 1.5rem 7rem; }

    /* ── HERO ── */
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 1.1rem;
    }
    .eyebrow::before { content: ''; display: block; width: 18px; height: 1px; background: var(--accent); }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(38px, 7vw, 58px);
      line-height: 1.0;
      letter-spacing: -0.02em;
    }
    h1 em { font-style: italic; color: var(--muted); }
    .hero-sub { margin-top: 1rem; font-size: 14px; color: var(--muted); max-width: 420px; line-height: 1.7; }
    .hero { margin-bottom: 3rem; }

    /* ── STEPS ── */
    .steps { display: flex; align-items: center; gap: 8px; margin-bottom: 2.5rem; }
    .step { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--dim); letter-spacing: 0.05em; transition: color 0.2s; }
    .step.active { color: var(--text); }
    .step.done   { color: var(--muted); }
    .step-num {
      width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .step.active .step-num { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
    .step.done   .step-num { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }
    .step-line { flex: 1; max-width: 36px; height: 1px; background: var(--border); }

    /* ── LABELS ── */
    .label {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 8px;
    }

    /* ── LIGA TABS ── */
    .liga-tabs {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .liga-tab {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .liga-tab:hover { border-color: var(--border-h); color: var(--text); background: var(--bg3); }
    .liga-tab.active {
      border-color: var(--accent);
      background: var(--accent-bg);
      color: var(--accent);
      font-weight: 500;
    }
    .liga-flag { font-size: 14px; line-height: 1; }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

    /* ── SEARCH ── */
    .search-wrap { position: relative; margin-bottom: 1rem; }
    .search-wrap input {
      width: 100%;
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2);
      padding: 11px 14px 11px 38px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--dim); }
    .search-wrap input:focus { border-color: var(--border-h); }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--dim); pointer-events: none;
    }

    /* ── TEAM GRID ── */
    .team-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 5px; max-height: 300px; overflow-y: auto;
      margin-bottom: 1.25rem; padding-right: 4px;
    }
    .team-grid::-webkit-scrollbar { width: 3px; }
    .team-grid::-webkit-scrollbar-track { background: transparent; }
    .team-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .team-btn {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2);
      padding: 10px 12px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      text-align: left; cursor: pointer; line-height: 1.3;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .team-btn:hover { border-color: var(--border-h); color: var(--text); background: var(--bg3); }
    .team-btn.selected {
      border-color: var(--accent); background: var(--accent-bg);
      color: var(--accent); font-weight: 500;
    }

    /* ── SELECTED BAR ── */
    .sel-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 11px 16px;
      margin-bottom: 1rem; font-size: 14px;
    }
    .sel-bar .s-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); }
    .sel-bar .s-name { color: var(--text); font-weight: 500; margin-top: 2px; }
    .sel-bar .s-liga { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .clear-btn {
      background: none; border: none; color: var(--dim);
      cursor: pointer; font-size: 20px; line-height: 1; padding: 0 4px;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--text); }

    /* ── CTA ── */
    .cta {
      width: 100%; padding: 13px 20px;
      background: var(--accent); border: none; border-radius: var(--r2);
      color: #0d0d0d; font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; letter-spacing: 0.02em;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .cta:hover:not(:disabled) { opacity: 0.86; transform: translateY(-1px); }
    .cta:active:not(:disabled) { transform: none; }
    .cta:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ── RESULT ── */
    #resultArea { margin-top: 2.5rem; }

    .result-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }

    .match-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
    .match-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .match-date { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); }

    .pill {
      padding: 3px 11px; border-radius: 100px;
      font-size: 10px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
    }
    .pill-win  { background: var(--win-bg);  color: var(--win);  }
    .pill-draw { background: var(--draw-bg); color: var(--draw); }
    .pill-loss { background: var(--loss-bg); color: var(--loss); }

    .match-event { font-family: 'DM Serif Display', serif; font-size: 20px; line-height: 1.25; color: var(--text); margin-bottom: 10px; }
    .match-score { font-size: 36px; font-weight: 300; letter-spacing: 0.08em; color: var(--text); }

    /* ── PLAYLISTS ── */
    .pl-section { padding: 1.25rem 1.5rem; }
    .pl-heading { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 1rem; }

    .pl-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      animation: fadeUp 0.3s ease both;
    }
    .pl-item:last-child { border-bottom: none; padding-bottom: 0; }
    .pl-item:nth-child(1) { animation-delay: 0.05s; }
    .pl-item:nth-child(2) { animation-delay: 0.10s; }
    .pl-item:nth-child(3) { animation-delay: 0.15s; }
    .pl-item:nth-child(4) { animation-delay: 0.20s; }

    .pl-num { width: 20px; flex-shrink: 0; font-size: 11px; color: var(--dim); text-align: right; }
    .pl-info { flex: 1; min-width: 0; }
    .pl-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-owner { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .pl-link {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 11px; border: 1px solid var(--border); border-radius: var(--r2);
      color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px;
      text-decoration: none; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .pl-link:hover { border-color: var(--border-h); color: var(--text); }

    /* ── STATUS ── */
    .status {
      padding: 2.5rem; display: flex; align-items: center;
      justify-content: center; gap: 10px;
      color: var(--muted); font-size: 13px;
    }
    .spinner {
      width: 15px; height: 15px;
      border: 1.5px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-error { color: var(--loss); }

    .empty { padding: 3rem 1.5rem; text-align: center; color: var(--dim); font-size: 13px; }
  </style>
</head>
<body>
<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="eyebrow">Fútbol &amp; Música</div>
    <h1>Tu equipo,<br><em>tu soundtrack</em></h1>
    <p class="hero-sub">Elegí tu liga y equipo. Buscamos el último resultado y armamos la playlist perfecta para el momento.</p>
  </div>

  <!-- STEPS -->
  <div class="steps">
    <div class="step active" id="step1"><div class="step-num">1</div><span>Liga</span></div>
    <div class="step-line"></div>
    <div class="step" id="step2"><div class="step-num">2</div><span>Equipo</span></div>
    <div class="step-line"></div>
    <div class="step" id="step3"><div class="step-num">3</div><span>Partido</span></div>
    <div class="step-line"></div>
    <div class="step" id="step4"><div class="step-num">4</div><span>Playlist</span></div>
  </div>

  <!-- LIGA SELECTOR -->
  <div class="label">Elegí una liga</div>
  <div class="liga-tabs" id="ligaTabs">
    <div class="status"><div class="spinner"></div></div>
  </div>

  <div class="divider"></div>

  <!-- EQUIPO SELECTOR -->
  <div id="equipoSection" style="display:none">
    <div class="label" id="equipoLabel">Buscar equipo</div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar..." oninput="filtrarEquipos()" />
    </div>
    <div class="team-grid" id="teamGrid"></div>
  </div>

  <!-- SELECTED BAR -->
  <div id="selectedBar" style="display:none" class="sel-bar">
    <div>
      <div class="s-label">Equipo seleccionado</div>
      <div class="s-name" id="selectedName">—</div>
      <div class="s-liga" id="selectedLiga">—</div>
    </div>
    <button class="clear-btn" onclick="limpiarEquipo()" title="Cambiar">×</button>
  </div>

  <button class="cta" id="consultarBtn" disabled onclick="consultar()">
    Consultar último partido →
  </button>

  <!-- RESULT -->
  <div id="resultArea"></div>

</div>

<script>
let ligas = [];
let ligaActual = null;
let equipoSeleccionado = null;
let equiposFiltrados = [];

// ── CARGAR LIGAS ──
async function init() {
  try {
    const res = await fetch("http://localhost:3000/api/ligas");
    ligas = await res.json();
    renderLigas();
  } catch {
    document.getElementById("ligaTabs").innerHTML =
      '<div class="status status-error">Error cargando ligas</div>';
  }
}

// ── RENDER LIGAS ──
function renderLigas() {
  const tabs = document.getElementById("ligaTabs");
  tabs.innerHTML = ligas.map(l => `
    <button
      class="liga-tab${ligaActual?.id === l.id ? " active" : ""}"
      onclick="seleccionarLiga('${l.id}')">
      <span class="liga-flag">${l.bandera}</span>
      ${l.nombre}
    </button>
  `).join("");
}

// ── SELECCIONAR LIGA ──
function seleccionarLiga(id) {
  ligaActual = ligas.find(l => l.id === id);
  limpiarEquipo(true);
  renderLigas();

  const sec = document.getElementById("equipoSection");
  sec.style.display = "block";
  document.getElementById("equipoLabel").textContent =
    `Equipos — ${ligaActual.nombre}`;

  equiposFiltrados = [...ligaActual.equipos];
  document.getElementById("searchInput").value = "";
  renderEquipos();
  setStep(1);
}

// ── RENDER EQUIPOS ──
function renderEquipos() {
  const grid = document.getElementById("teamGrid");
  if (!equiposFiltrados.length) {
    grid.innerHTML = '<div class="empty">Sin resultados</div>';
    return;
  }
  grid.innerHTML = equiposFiltrados.map(eq => `
    <button
      class="team-btn${equipoSeleccionado?.id === eq.id ? " selected" : ""}"
      onclick="seleccionarEquipo('${eq.id}')">
      ${eq.nombre}
    </button>
  `).join("");
}

// ── SELECCIONAR EQUIPO ──
function seleccionarEquipo(id) {
  equipoSeleccionado = ligaActual.equipos.find(e => e.id === id);
  document.getElementById("selectedName").textContent = equipoSeleccionado.nombre;
  document.getElementById("selectedLiga").textContent = `${ligaActual.bandera} ${ligaActual.nombre}`;
  document.getElementById("selectedBar").style.display = "flex";
  document.getElementById("consultarBtn").disabled = false;
  document.getElementById("resultArea").innerHTML = "";
  setStep(2);
  renderEquipos();
}

// ── LIMPIAR EQUIPO ──
function limpiarEquipo(silent = false) {
  equipoSeleccionado = null;
  document.getElementById("selectedBar").style.display = "none";
  document.getElementById("consultarBtn").disabled = true;
  if (!silent) document.getElementById("resultArea").innerHTML = "";
  if (!silent) setStep(ligaActual ? 1 : 0);
  renderEquipos();
}

// ── FILTRAR ──
function filtrarEquipos() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  equiposFiltrados = ligaActual
    ? ligaActual.equipos.filter(e => e.nombre.toLowerCase().includes(q))
    : [];
  renderEquipos();
}

// ── STEPS ──
function setStep(n) {
  const ids = ["step1","step2","step3","step4"];
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = "step" + (i < n ? " done" : i === n ? " active" : "");
    el.querySelector(".step-num").textContent = i < n ? "✓" : i + 1;
  });
}

// ── CONSULTAR ──
async function consultar() {
  if (!equipoSeleccionado) return;
  const area = document.getElementById("resultArea");
  setStep(3);

  area.innerHTML = `
    <div class="result-card">
      <div class="status">
        <div class="spinner"></div> Buscando partido...
      </div>
    </div>`;

  try {
    const res = await fetch(`http://localhost:3000/api/equipo/${equipoSeleccionado.id}`);
    const data = await res.json();

    const p = data.partido;
    const resultado = data.resultado;

    const pillClass =
      resultado === "GANO"   ? "pill-win"  :
      resultado === "PERDIO" ? "pill-loss" : "pill-draw";

    const pillLabel =
      resultado === "GANO"   ? "Victoria" :
      resultado === "PERDIO" ? "Derrota"  : "Empate";

    area.innerHTML = `
      <div class="result-card">
        <div class="match-header">
          <div class="match-meta">
            <span class="match-date">${p.dateEvent}</span>
            <span class="pill ${pillClass}">${pillLabel}</span>
          </div>
          <div class="match-event">${p.strEvent}</div>
          <div class="match-score">${p.intHomeScore} — ${p.intAwayScore}</div>
        </div>
        <div class="pl-section">
          <div class="pl-heading">Playlists recomendadas</div>
          <div id="playlistArea"></div>
        </div>
      </div>`;

    renderPlaylists(data.playlists);
    setStep(4);

  } catch {
    area.innerHTML = `
      <div class="result-card">
        <div class="status status-error">Error al conectar con el servidor</div>
      </div>`;
    setStep(2);
  }
}

// ── RENDER PLAYLISTS ──
function renderPlaylists(playlists) {
  const pArea = document.getElementById("playlistArea");
  if (!playlists || !playlists.length) {
    pArea.innerHTML = '<div class="status">Sin playlists disponibles</div>';
    return;
  }
  pArea.innerHTML = playlists.map((p, i) => p ? `
    <div class="pl-item">
      <span class="pl-num">${i + 1}</span>
      <div class="pl-info">
        <div class="pl-name">${p.name}</div>
        <div class="pl-owner">${p.owner?.display_name || "Spotify"}</div>
      </div>
      <a class="pl-link" href="${p.external_urls.spotify}" target="_blank">Abrir</a>
    </div>
  ` : "").join("");
}

init();
</script>
</body>
</html>
